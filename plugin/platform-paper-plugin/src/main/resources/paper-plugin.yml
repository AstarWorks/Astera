name: Astera
version: '${version}'
main: com.astarworks.astera.platform.paper.AsteraPlugin
api-version: '1.21'
authors: [AstarWorks]
description: AstarWorks official Minecraft server (Siege / UGC / Place).
website: https://github.com/AstarWorks/Astera

# All external plugin dependencies are SOFT-DEPS (ADR-0009).
# Astera must boot in vanilla Paper without any of these.
# Provider modules (adapter/providers/*) detect presence at runtime.
dependencies:
  server:
    WeaponMechanics:
      load: BEFORE
      required: false
      join-classpath: true
    Oraxen:
      load: BEFORE
      required: false
      join-classpath: true
    MythicMobs:
      load: BEFORE
      required: false
      join-classpath: true
    ProtocolLib:
      load: BEFORE
      required: false
      join-classpath: true
    PlaceholderAPI:
      load: BEFORE
      required: false
      join-classpath: true
