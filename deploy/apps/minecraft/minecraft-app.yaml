---
# ArgoCD Application that syncs deploy/minecraft into the `astera` namespace.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: astera-minecraft
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/AstarWorks/Astera.git
    targetRevision: main
    path: deploy/minecraft
  destination:
    server: https://kubernetes.default.svc
    namespace: astera
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /metadata/annotations
    - group: "*"
      kind: "*"
      jqPathExpressions:
        - .metadata.annotations."argocd.argoproj.io/tracking-id"
