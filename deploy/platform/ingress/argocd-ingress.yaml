---
# Placeholder host. Real host + ingressClassName + TLS cert ref live in the
# environment overlay under `private/infra/overlays/<env>/`.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.astera.local
      secretName: argocd-tls
  rules:
    - host: argocd.astera.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
