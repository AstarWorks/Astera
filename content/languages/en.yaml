# English locale (fallback).
# See ja.yaml for key naming conventions and MiniMessage syntax.

astera:
  system:
    welcome: "Welcome to <gold><bold>Astera</bold></gold>, {player}!"
    plugin_enabled: "<green>Astera plugin enabled</green>"
    plugin_disabled: "<yellow>Disabling Astera plugin...</yellow>"

  command:
    give:
      success: "<green>Gave <gold>{weapon}</gold> to {player}</green>"
      not_found: "<red>Weapon id <gold>{weapon}</gold> not found</red>"
      usage: "<yellow>Usage: /astera give <player> <weapon-id></yellow>"

  weapon:
    example-sword:
      name: "<gold>Example Sword</gold>"
      lore:
        - "<gray>Phase 1 demo weapon</gray>"
        - "<gray>Left-click to attack</gray>"
        - "<dark_gray>archetype: sword / rarity: common</dark_gray>"
    example-pistol:
      name: "<aqua>Example Pistol</aqua>"
      lore:
        - "<gray>Phase 2 starter: gun archetype</gray>"
        - "<gray>Rapid fire (0.3s cooldown)</gray>"
        - "<dark_gray>archetype: gun / rarity: common</dark_gray>"
    example-wand:
      name: "<light_purple>Example Wand</light_purple>"
      lore:
        - "<gray>Phase 2 starter: wand archetype</gray>"
        - "<gray>High damage, long CD (3s)</gray>"
        - "<dark_gray>archetype: wand / rarity: rare</dark_gray>"
    fired: "<yellow>{player} fired <gold>{weapon}</gold></yellow>"
    on_cooldown: "<red>{weapon} is on cooldown ({remaining})</red>"
    none_held: "<gray>No weapon equipped</gray>"

  error:
    internal: "<red>An internal error occurred. Check server logs for details.</red>"
    permission: "<red>You do not have permission to run this command</red>"
