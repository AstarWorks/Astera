name: Build & Push Docker image

on:
  push:
    branches:
      - main
  release:
    types: [published]

concurrency:
  group: image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: astarworks/astera

jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # On main: branch name + short SHA + 'latest'.
          # On release tags (vX.Y.Z): semver expansion (X.Y.Z, X.Y, X).
          tags: |
            type=ref,event=branch
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root because the Dockerfile is multi-stage
          # and runs `./gradlew :plugin:platform-paper-plugin:shadowJar` against the full source tree.
          context: .
          file: docker/Dockerfile
          # Phase 1: amd64 only. arm64 will be added once the itzg base image and
          # JDK 25 toolchain stability are confirmed on ARM.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
